<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Where have easily view- &amp; download-able user-generated (scalable) animations + games gone? Think about what they took from us. Now files are big &amp; JS-less pausing requires a 2026+ web browser...</title>
  <meta property="og:title" content="Where have easily view- &amp; download-able user-generated (scalable) animations + games gone? Think about what they took from us. Now files are big &amp; JS-less pausing requires a 2026+ web browser..." />
  <meta property="og:image" content="limewire.svg" />
  <meta property="og:image:type" content="image/svg+xml" />
  <style>
    :root {
      --bg: #000;
      --panel-bg: #070707;
      --panel-line: #4b4b4b;
      --text: #fff;
      --muted: #b8b8b8;
      --active-bg: #fff;
      --active-text: #000;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      display: grid;
      grid-template-columns: 1fr 300px;
    }

    main {
      min-width: 0;
      min-height: 0;
      background: var(--bg);
    }

    .viewer-stack {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .viewer-frame {
      display: none;
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg);
      position: absolute;
      inset: 0;
    }

    .viewer-default {
      display: block;
    }

    .viewer-frame:target {
      display: block;
    }

    .viewer-frame:target ~ .viewer-default {
      display: none;
    }

    .fallback {
      color: #d2d2d2;
      text-align: center;
      padding: 24px;
      line-height: 1.5;
    }

    .empty {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      color: #d2d2d2;
      padding: 24px;
      text-align: center;
    }

    aside {
      border-left: 2px solid #fff;
      background: var(--panel-bg);
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
    }

    .sidebar-header {
      border-bottom: 1px solid var(--panel-line);
      padding: 10px 10px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .sidebar-header h2 {
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .sidebar-header span {
      color: var(--muted);
      font-size: 0.74rem;
      white-space: nowrap;
    }

    .list {
      overflow: auto;
      padding: 6px;
      display: grid;
      align-content: start;
      gap: 4px;
    }

    .card {
      text-decoration: none;
      border: 1px solid var(--panel-line);
      background: #111;
      color: var(--text);
      width: 100%;
      min-height: 28px;
      padding: 4px 6px;
      border-radius: 4px;
      display: grid;
      grid-template-columns: 22px 1fr;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      text-align: left;
      transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
    }

    .card:hover {
      background: #1f1f1f;
      border-color: #fff;
    }

    .card:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 1px;
    }

    .card.default {
      background: var(--active-bg);
      color: var(--active-text);
      border-color: #fff;
      font-weight: 700;
    }

    @supports selector(body:has(*)) {
      body:has(.viewer-frame:target) .card.default {
        background: #111;
        color: var(--text);
        border-color: var(--panel-line);
        font-weight: 400;
      }

      body:has(#view-greenie:target) .card[href="#view-greenie"] {
        background: var(--active-bg);
        color: var(--active-text);
        border-color: #fff;
        font-weight: 700;
      }

      body:has(#view-limewire:target) .card[href="#view-limewire"] {
        background: var(--active-bg);
        color: var(--active-text);
        border-color: #fff;
        font-weight: 700;
      }

      body:has(#view-reimu-rope-skip:target) .card[href="#view-reimu-rope-skip"] {
        background: var(--active-bg);
        color: var(--active-text);
        border-color: #fff;
        font-weight: 700;
      }
    }

    .card-index {
      opacity: 0.75;
      font-size: 0.72rem;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .card-title {
      font-size: 0.76rem;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 900px) {
      body {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 180px;
      }

      aside {
        border-left: 0;
        border-top: 2px solid #fff;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="viewer-stack">
      <object id="view-greenie" class="viewer-frame" type="image/svg+xml" data="Greenie.svg">
        <p class="fallback">Your client doesn't support SVG even though it could without any danger.<br><strong>Raise your voice to get this changed.</strong></p>
      </object>
      <object id="view-reimu-rope-skip" class="viewer-frame" type="image/svg+xml" data="Reimu_rope_skip.svg">
        <p class="fallback">Your client doesn't support SVG even though it could without any danger.<br><strong>Raise your voice to get this changed.</strong></p>
      </object>
      <object id="view-limewire" class="viewer-frame viewer-default" type="image/svg+xml" data="limewire.svg">
        <p class="fallback">Your client doesn't support SVG even though it could without any danger.<br><strong>Raise your voice to get this changed.</strong></p>
      </object>
    </div>
  </main>

  <aside>
    <div class="sidebar-header">
      <h2>Library</h2>
      <span>3 items</span>
    </div>
    <div class="list">
      <a class="card" href="#view-greenie" title="Greenie.svg" aria-label="Show Greenie"><span class="card-index">01</span><span class="card-title">Greenie</span></a>
      <a class="card default" href="#view-limewire" title="limewire.svg" aria-label="Show limewire"><span class="card-index">02</span><span class="card-title">limewire</span></a>
      <a class="card" href="#view-reimu-rope-skip" title="Reimu_rope_skip.svg" aria-label="Show Reimu rope skip"><span class="card-index">03</span><span class="card-title">Reimu rope skip</span></a>
    </div>
  </aside>
</body>
</html>
