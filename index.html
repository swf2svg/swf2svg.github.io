<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>swf2svg</title>
  <meta property="og:title" content="swf2svg" />
  <meta property="og:image" content="limewire.svg" />
  <meta property="og:image:type" content="image/svg+xml" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw;
      height: 100vh;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
    }
    object { width: 100%; height: 100%; }
    #fallback {
      display: none;
      color: #aaa;
      text-align: center;
      max-width: 400px;
      line-height: 1.6;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <object type="image/svg+xml" data="limewire.svg">
    <p id="fallback">
      Your client doesn't support SVG even tho it could without any danger.<br>
      <strong>Raise your voice to get this changed.</strong>
    </p>
  </object>

  <script>
    // object元素内のコンテンツは自動フォールバックだが、
    // JS でも念のため SVG 読み込み失敗を検知して表示する
    const obj = document.querySelector('object');
    obj.addEventListener('error', () => {
      document.getElementById('fallback').style.display = 'block';
    });
  </script>
</body>
</html>
